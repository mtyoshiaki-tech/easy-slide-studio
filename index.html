<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サクッと編集アプリ</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Mochiy+Pop+One&family=Rampart+One&display=swap" rel="stylesheet">
  
  <!-- Font Awesome (Icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* アニメーションの定義 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.25s ease-out forwards;
    }
    /* スクロールバーのカスタマイズ */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen overflow-hidden flex flex-col md:flex-row">

  <!-- サイドバー -->
  <aside class="w-full md:w-80 bg-white border-r shadow-sm flex flex-col p-5 space-y-6 overflow-y-auto z-20 flex-shrink-0 h-full">
    <div class="text-2xl font-extrabold text-indigo-600 flex items-center gap-3">
      <i class="fa-solid fa-wand-magic-sparkles text-indigo-600 text-3xl animate-pulse"></i>
      サクッと編集アプリ
    </div>
    <p class="text-sm text-gray-500 font-medium">一部を消したり、一部追加したりします。</p>
    
    <!-- 最初からやり直すボタン（初期は非表示） -->
    <button
      id="btnReset"
      class="hidden w-full py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-600 hover:text-gray-800 font-bold rounded-xl transition flex justify-center items-center gap-2 text-sm border border-gray-200"
    >
      <i class="fa-solid fa-trash-arrow-up"></i>
      最初からやり直す
    </button>

    <!-- ローディングインジケータ -->
    <div id="loadingIndicator" class="p-4 bg-indigo-50 border border-indigo-100 text-indigo-700 rounded-lg text-sm flex items-center gap-3 shadow-inner">
      <div class="w-4 h-4 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
      <span id="loadingText">ライブラリをロード中...</span>
    </div>

    <!-- メインコントロール（初期は非表示、アプリロード完了で表示） -->
    <div id="mainControls" class="hidden space-y-6 pb-10">
      
      <!-- 1. ファイル読み込み -->
      <div class="space-y-2">
        <label class="block text-sm font-bold text-gray-700">1. ファイルを読み込む</label>
        
        <div 
          id="dropZone"
          class="border-2 border-dashed border-gray-300 hover:border-indigo-400 bg-gray-50 hover:bg-indigo-50/30 text-gray-500 rounded-2xl p-6 text-center cursor-pointer transition-all duration-200 flex flex-col items-center justify-center gap-2"
        >
          <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400" id="uploadIcon"></i>
          <div class="text-xs font-semibold">
            画像やPDFをここにドラッグ＆ドロップ
          </div>
          <div class="text-[10px] text-gray-400">
            またはクリックしてファイルを選択
          </div>
          
          <input 
            type="file" 
            id="fileInput"
            accept="image/*,application/pdf" 
            class="hidden" 
          />
        </div>
      </div>

      <!-- 編集セクション（画像読み込み後に表示） -->
      <div id="editingSection" class="hidden animate-fade-in space-y-6">
        
        <!-- 操作履歴 (戻る・進む) エリア -->
        <div class="space-y-2 bg-gray-50 p-3.5 rounded-xl border border-gray-100">
          <label class="block text-xs font-bold text-gray-700">操作履歴</label>
          <div class="flex gap-2">
            <button 
              id="btnUndo"
              disabled
              class="flex-1 py-2 px-3 bg-orange-50 border border-orange-200 text-orange-700 hover:bg-orange-100 active:bg-orange-200 font-bold rounded-xl shadow-sm transition flex justify-center items-center gap-1.5 disabled:opacity-50 disabled:bg-gray-100 disabled:text-gray-400 disabled:border-gray-200 text-xs"
              title="1つ前に戻る"
            >
              <i class="fa-solid fa-arrow-rotate-left"></i>
              戻る
            </button>
            <button 
              id="btnRedo"
              disabled
              class="flex-1 py-2 px-3 bg-emerald-50 border border-emerald-200 text-emerald-700 hover:bg-emerald-100 active:bg-emerald-200 font-bold rounded-xl shadow-sm transition flex justify-center items-center gap-1.5 disabled:opacity-50 disabled:bg-gray-100 disabled:text-gray-400 disabled:border-gray-200 text-xs"
              title="やり直す"
            >
              進む
              <i class="fa-solid fa-arrow-rotate-right"></i>
            </button>
          </div>
        </div>

        <!-- 2. ツール選択 -->
        <div class="space-y-3">
          <label class="block text-sm font-bold text-gray-700">2. ツール選択</label>
          <div class="grid grid-cols-2 gap-1.5">
            <button
              id="toolRect"
              data-mode="rectangle"
              class="tool-btn py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 bg-indigo-50 border-indigo-500 text-indigo-700 shadow-sm"
            >
              <i class="fa-regular fa-square text-lg"></i>
              四角形(消去)
            </button>
            <button
              id="toolArrow"
              data-mode="arrow"
              class="tool-btn py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 bg-white border-gray-200 text-gray-600 hover:bg-gray-50"
            >
              <i class="fa-solid fa-arrow-right text-lg"></i>
              矢印を描く
            </button>
            <button
              id="toolNumber"
              data-mode="number"
              class="tool-btn py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 bg-white border-gray-200 text-gray-600 hover:bg-gray-50"
            >
              <span class="text-base font-extrabold leading-tight">①</span>
              数字スタンプ
            </button>
            <button
              id="toolShape"
              data-mode="shape"
              class="tool-btn py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 bg-white border-gray-200 text-gray-600 hover:bg-gray-50"
            >
              <div class="flex gap-0.5 items-center">
                <i class="fa-regular fa-square text-xs"></i>
                <i class="fa-regular fa-circle text-xs"></i>
              </div>
              図形を描く
            </button>
            <button
              id="toolText"
              data-mode="text"
              class="tool-btn col-span-2 py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 bg-white border-gray-200 text-gray-600 hover:bg-gray-50"
            >
              <i class="fa-solid fa-font text-lg"></i>
              テキスト入力
            </button>
          </div>
        </div>

        <!-- パネル類（選択ツールに応じて切り替え表示） -->
        
        <!-- 矢印設定 -->
        <div id="panelArrow" class="hidden space-y-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1.5">形状</label>
            <div class="flex gap-2">
              <button id="arrowTypeStraight" class="flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-indigo-600 border-indigo-600 text-white">
                直線
              </button>
              <button id="arrowTypeCurved" class="flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-white border-gray-200 text-gray-600 hover:bg-gray-50">
                曲線
              </button>
            </div>
          </div>

          <div id="curvedSetting" class="hidden">
            <div class="flex justify-between items-center mb-1">
              <label class="block text-xs font-bold text-gray-700">曲がり具合と向き</label>
              <span id="curvinessLabel" class="text-xs text-gray-500 font-mono">右曲がり (+30)</span>
            </div>
            <input 
              id="arrowCurviness"
              type="range" min="-180" max="180" value="30"
              class="w-full accent-indigo-600"
            />
            <div class="flex justify-between text-[10px] text-gray-400 px-1 mt-0.5">
              <span>← 左に大きくカーブ</span>
              <span>直線</span>
              <span>右に大きくカーブ →</span>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">色</label>
            <input 
              id="arrowColor"
              type="color" value="#ff0000"
              class="w-full h-8 cursor-pointer border-0 p-0 rounded bg-transparent"
            />
          </div>
          
          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-xs font-bold text-gray-700">太さ / 大きさ</label>
              <span id="arrowSizeLabel" class="text-xs text-gray-500">15px</span>
            </div>
            <input 
              id="arrowSize"
              type="range" min="1" max="200" value="15"
              class="w-full accent-indigo-600"
            />
          </div>

          <!-- プレビューエリア -->
          <div class="mt-2 pt-4 border-t border-gray-200">
            <label class="block text-xs font-bold text-gray-700 mb-2">プレビュー</label>
            <div class="bg-white border border-gray-200 rounded-lg h-24 flex items-center justify-center overflow-hidden">
              <svg id="arrowPreviewSvg" width="100%" height="100%">
                <defs>
                  <marker id="arrowhead-preview" markerWidth="3.5" markerHeight="3.5" refX="2.5" refY="1.75" orient="auto">
                    <polygon points="0 0, 3.5 1.75, 0 3.5" fill="#ff0000" />
                  </marker>
                </defs>
                <line id="previewLine" x1="30" y1="50" x2="170" y2="50" stroke="#ff0000" stroke-width="15" marker-end="url(#arrowhead-preview)" stroke-linecap="butt" />
                <path id="previewCurve" class="hidden" d="M 30 50 Q 100 50 170 50" fill="none" stroke="#ff0000" stroke-width="15" marker-end="url(#arrowhead-preview)" stroke-linecap="butt" />
              </svg>
            </div>
          </div>
        </div>

        <!-- 数字スタンプ設定 -->
        <div id="panelNumber" class="hidden space-y-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-2">挿入する数字</label>
            <div class="grid grid-cols-5 gap-1.5" id="numberSelectorContainer">
              <!-- JSで動的にスタンプ一覧を生成 -->
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">色</label>
            <input 
              id="numberColor"
              type="color" value="#ff0000"
              class="w-full h-8 cursor-pointer border-0 p-0 rounded bg-transparent"
            />
          </div>

          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-xs font-bold text-gray-700">サイズ</label>
              <span id="numberSizeLabel" class="text-xs text-gray-500">50px</span>
            </div>
            <input 
              id="numberSize"
              type="range" min="10" max="500" value="50"
              class="w-full accent-indigo-600"
            />
          </div>

          <!-- プレビューエリア -->
          <div class="mt-2 pt-4 border-t border-gray-200">
            <label class="block text-xs font-bold text-gray-700 mb-2">プレビュー</label>
            <div class="bg-white border border-gray-200 rounded-lg h-24 flex items-center justify-center overflow-hidden relative">
              <span id="numberPreviewText" class="font-bold" style="color: #ff0000; font-size: 50px; line-height: 1;">①</span>
            </div>
          </div>
        </div>

        <!-- テキスト設定エリア -->
        <div id="panelText" class="hidden space-y-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">入力するテキスト</label>
            <input 
              id="textValue"
              type="text" 
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="テキストを入力してください"
            />
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1.5">フォント</label>
            <select
              id="textFont"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
            >
              <option value="'BIZ UDPGothic', sans-serif">BIZ UDPGothic (標準)</option>
              <option value="'Mochiy Pop One', sans-serif">Mochiy Pop One</option>
              <option value="'Rampart One', sans-serif">Rampart One</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">色</label>
            <input 
              id="textColor"
              type="color" value="#ff0000"
              class="w-full h-8 cursor-pointer border-0 p-0 rounded bg-transparent"
            />
          </div>

          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-xs font-bold text-gray-700">フォントサイズ</label>
              <span id="textSizeLabel" class="text-xs text-gray-500">30px</span>
            </div>
            <input 
              id="textSize"
              type="range" min="10" max="500" value="30"
              class="w-full accent-indigo-600"
            />
          </div>

          <!-- プレビューエリア -->
          <div class="mt-2 pt-4 border-t border-gray-200">
            <label class="block text-xs font-bold text-gray-700 mb-2">プレビュー</label>
            <div class="bg-white border border-gray-200 rounded-lg h-24 flex items-center justify-center overflow-hidden p-2 relative">
              <span id="textPreviewText" class="font-bold truncate max-w-full" style="color: #ff0000; font-size: 30px; font-family: 'BIZ UDPGothic', sans-serif; white-space: nowrap; line-height: 1;">テキスト</span>
            </div>
          </div>
        </div>

        <!-- 図形設定エリア -->
        <div id="panelShape" class="hidden space-y-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1.5">形状</label>
            <div class="flex gap-2">
              <button id="shapeTypeRect" class="shape-type-btn flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-indigo-600 border-indigo-600 text-white" data-shape="rect">
                四角
              </button>
              <button id="shapeTypeCircle" class="shape-type-btn flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-white border-gray-200 text-gray-600 hover:bg-gray-50" data-shape="circle">
                丸
              </button>
              <button id="shapeTypeLine" class="shape-type-btn flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-white border-gray-200 text-gray-600 hover:bg-gray-50" data-shape="line">
                直線
              </button>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-700 mb-1">色</label>
            <input 
              id="shapeColor"
              type="color" value="#ff0000"
              class="w-full h-8 cursor-pointer border-0 p-0 rounded bg-transparent"
            />
          </div>

          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-xs font-bold text-gray-700">線の太さ</label>
              <span id="shapeSizeLabel" class="text-xs text-gray-500">5px</span>
            </div>
            <input 
              id="shapeSize"
              type="range" min="1" max="100" value="5"
              class="w-full accent-indigo-600"
            />
          </div>

          <!-- プレビューエリア -->
          <div class="mt-2 pt-4 border-t border-gray-200">
            <label class="block text-xs font-bold text-gray-700 mb-2">プレビュー</label>
            <div class="bg-white border border-gray-200 rounded-lg h-24 flex items-center justify-center overflow-hidden relative">
              <svg id="shapePreviewSvg" width="100%" height="100%">
                <rect id="previewShapeRect" x="25%" y="25%" width="50%" height="50%" fill="none" stroke="#ff0000" stroke-width="5" stroke-linejoin="round" />
                <circle id="previewShapeCircle" class="hidden" cx="50%" cy="50%" r="20%" fill="none" stroke="#ff0000" stroke-width="5" />
                <line id="previewShapeLine" class="hidden" x1="20%" y1="80%" x2="80%" y2="20%" stroke="#ff0000" stroke-width="5" stroke-linecap="round" />
              </svg>
            </div>
          </div>
        </div>

        <!-- アクションボタン -->
        <div class="space-y-3">
          <button 
            id="btnErase"
            class="w-full py-3 px-4 bg-indigo-600 text-white font-bold rounded-xl shadow-md hover:bg-indigo-700 active:bg-indigo-800 transition flex justify-center items-center gap-2 disabled:opacity-50 text-sm"
          >
            <i class="fa-solid fa-sparkles"></i>
            囲んだ部分を消去
          </button>
          
          <button 
            id="btnResetSelection"
            class="w-full py-2 px-4 bg-gray-100 text-gray-700 font-medium rounded-xl hover:bg-gray-200 transition text-sm"
          >
            選択をやり重す
          </button>
        </div>

        <!-- 保存して出力 -->
        <div class="pt-6 border-t space-y-3">
          <label class="block text-sm font-bold text-gray-700 mb-2">3. 保存して出力</label>
          <button 
            id="btnExportPdf"
            class="w-full py-2.5 px-4 border-2 border-red-500 text-red-600 font-bold rounded-xl hover:bg-red-50 transition flex justify-center items-center gap-2"
          >
            <i class="fa-solid fa-file-pdf"></i>
            PDFで保存
          </button>
          <button 
            id="btnExportPptx"
            class="w-full py-2.5 px-4 border-2 border-orange-500 text-orange-600 font-bold rounded-xl hover:bg-orange-50 transition flex justify-center items-center gap-2"
          >
            <i class="fa-solid fa-file-powerpoint"></i>
            PowerPointで保存
          </button>
        </div>

      </div>
    </div>
  </aside>

  <!-- キャンバス・メイン作業領域 -->
  <div class="flex-1 relative flex flex-col h-screen overflow-hidden bg-gray-200">
    
    <!-- メインキャンバスエリア -->
    <main 
      id="canvasContainer"
      class="flex-1 overflow-auto px-4 py-16 md:px-8 md:py-24 flex justify-center items-center select-none"
    >
      <!-- コピー＆ペーストショートカット促しトースト（画像ペースト待機時） -->
      <div id="pasteGuide" class="hidden absolute top-4 left-1/2 -translate-x-1/2 bg-gray-800/90 text-white text-xs py-2 px-4 rounded-full shadow-lg flex items-center gap-2 z-30 transition-all">
        <i class="fa-solid fa-paste text-indigo-400"></i>
        <span>画像をCtrl + V（貼り付け）して挿入できます</span>
      </div>
      
      <!-- キャンバスコンテナ（画像読み込み後に表示） -->
      <div 
        id="canvasWrapper"
        class="relative shadow-2xl border-4 border-white bg-white mx-auto touch-none hidden cursor-crosshair"
      >
        <!-- ベース画像表示用キャンバス -->
        <canvas id="baseCanvas" class="absolute top-0 left-0 w-full h-full block rounded-sm pointer-events-none" style="z-index: 1;"></canvas>
        <!-- マスク(消去)描画用キャンバス -->
        <canvas id="drawingCanvas" class="absolute top-0 left-0 w-full h-full block rounded-sm pointer-events-none" style="z-index: 10;"></canvas>
        <!-- プレビュー描画用キャンバス -->
        <canvas id="previewCanvas" class="absolute top-0 left-0 w-full h-full rounded-sm" style="z-index: 20;"></canvas>
      </div>
      
      <!-- 初期化ガイダンス（ファイルロード前） -->
      <div 
        id="initialGuidance"
        class="text-gray-400 flex flex-col items-center justify-center p-10 bg-white rounded-3xl shadow-sm border border-dashed border-gray-300 hover:border-indigo-400 hover:bg-indigo-50/30 max-w-md w-full cursor-pointer transition-all duration-200"
      >
        <i class="fa-regular fa-image text-7xl mb-4 text-gray-300"></i>
        <p class="text-lg font-bold text-gray-600 mb-1">ファイルをここにドラッグ＆ドロップ</p>
        <p class="text-sm text-gray-400 text-center">または、クリックして画像・PDFファイルをロードしてください</p>
      </div>
    </main>

    <!-- 複数ページの切り替えナビゲーション（初期は非表示） -->
    <div 
      id="pageNavigation"
      class="hidden absolute bottom-10 left-1/2 transform -translate-x-1/2 bg-white px-5 py-2.5 rounded-full shadow-[0_10px_25px_-5px_rgba(0,0,0,0.3)] border border-gray-200 flex items-center gap-5 z-[9999] transition-all duration-200"
    >
      <button 
        id="btnPrevPage"
        class="p-2.5 rounded-full hover:bg-gray-100 disabled:opacity-30 disabled:hover:bg-transparent transition text-gray-700 cursor-pointer"
      >
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <span id="pageProgressLabel" class="font-bold text-gray-700 min-w-[4rem] text-center text-sm cursor-default">
        1 / 1
      </span>
      <button 
        id="btnNextPage"
        class="p-2.5 rounded-full hover:bg-gray-100 disabled:opacity-30 disabled:hover:bg-transparent transition text-gray-700 cursor-pointer"
      >
        <i class="fa-solid fa-chevron-right"></i>
      </button>
      
      <button 
        id="btnToggleNavPosition"
        class="p-2.5 rounded-full hover:bg-gray-100 text-gray-400 hover:text-indigo-600 transition border-l border-gray-200 pl-4 ml-1 cursor-pointer"
        title="表示位置を上下切り替え"
      >
        <i class="fa-solid fa-up-down"></i>
      </button>
    </div>

    <!-- 全画面ローディングオーバーレイ -->
    <div id="processingOverlay" class="hidden absolute inset-0 bg-gray-900 bg-opacity-40 flex items-center justify-center z-50 backdrop-blur-sm">
      <div class="bg-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 animate-pulse">
        <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <span class="font-bold text-lg text-gray-800">処理中...</span>
      </div>
    </div>
  </div>

  <!-- 各種外部ライブラリの非同期ロード -->
  <script>
    // ライブラリを読み込むヘルパー
    const loadScript = (src, id) => {
      return new Promise((resolve, reject) => {
        if (document.getElementById(id)) {
          return resolve();
        }
        const script = document.createElement('script');
        script.id = id;
        script.src = src;
        script.async = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    };

    // OpenCV.jsの初期化待ち

            resolve();
          } else {
            setTimeout(check, 100);
          }
        };
        check();
      });

    // スケール値の動的計算（表示上の幅と実際のピクセル幅の比率）
    function updateScale() {
      if (el.baseCanvas && state.hasImage) {
        const rect = el.baseCanvas.getBoundingClientRect();
        const actualWidth = el.baseCanvas.width;
        if (actualWidth > 0) {
          state.displayScale = rect.width / actualWidth;
        }
      }
    }

    // ResizeObserverによる自動スケール調整
    const resizeObserver = new ResizeObserver(() => {
      updateScale();
      if (state.pastedImage) {
        drawPastedImage();
      }
    });

    // 履歴管理
    function saveHistory() {
      const canvas = el.baseCanvas;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      
      const pIdx = state.currentPageIndex;
      
      if (!state.history[pIdx]) {
        state.history[pIdx] = [];
        state.historyIndex[pIdx] = -1;
      }
      
      // 戻った位置以降の履歴を削除
      const newHistory = state.history[pIdx].slice(0, state.historyIndex[pIdx] + 1);
      newHistory.push(imgData);
      
      if (newHistory.length > 20) {
        newHistory.shift();
      }
      
      state.history[pIdx] = newHistory;
      state.historyIndex[pIdx] = newHistory.length - 1;
      
      updateHistoryButtons();
    }

    function updateHistoryButtons() {
      const pIdx = state.currentPageIndex;
      const historyList = state.history[pIdx] || [];
      const currentIdx = state.historyIndex[pIdx] !== undefined ? state.historyIndex[pIdx] : -1;
      
      el.btnUndo.disabled = state.isProcessing || currentIdx <= 0;
      el.btnRedo.disabled = state.isProcessing || currentIdx >= historyList.length - 1;
    }

    // 各ツールの描画ヘルパー関数群

    // 矢印の計算と描画
    function drawArrowGeometry(ctx, fromX, fromY, toX, toY, color, width, type = 'straight', curviness = 30) {
      const headlen = width * 3.5;
      const dx = toX - fromX;
      const dy = toY - fromY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < 5) return;

      if (type === 'straight') {
        const angle = Math.atan2(dy, dx);
        const stopX = toX - (headlen * 0.5) * Math.cos(angle);
        const stopY = toY - (headlen * 0.5) * Math.sin(angle);

        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(stopX, stopY);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineCap = 'butt';
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.lineTo(toX, toY);
        ctx.fillStyle = color;
        ctx.fill();
      } else {
        const mx = (fromX + toX) / 2;
        const my = (fromY + toY) / 2;
        
        const offset = dist * (curviness / 180) * 0.75;
        const angleBetween = Math.atan2(dy, dx);
        const cx = mx + Math.cos(angleBetween + Math.PI / 2) * offset;
        const cy = my + Math.sin(angleBetween + Math.PI / 2) * offset;

        const headAngle = Math.atan2(toY - cy, toX - cx);
        const stopX = toX - (headlen * 0.5) * Math.cos(headAngle);
        const stopY = toY - (headlen * 0.5) * Math.sin(headAngle);

        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.quadraticCurveTo(cx, cy, stopX, stopY);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineCap = 'butt';
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(headAngle - Math.PI / 6), toY - headlen * Math.sin(headAngle - Math.PI / 6));
        ctx.lineTo(toX - headlen * Math.cos(headAngle + Math.PI / 6), toY - headlen * Math.sin(headAngle + Math.PI / 6));
        ctx.lineTo(toX, toY);
        ctx.fillStyle = color;
        ctx.fill();
      }
    }

    // 数字スタンプの描画
    function drawNumberStamp(ctx, x, y, text, color, size) {
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = `bold ${size}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    // テキストスタンプの描画
    function drawTextStamp(ctx, x, y, text, color, size, font) {
      ctx.save();
      ctx.fillStyle = color;
      ctx.font = `bold ${size}px ${font}`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    // 図形描画
    function drawShapeGeometry(ctx, fromX, fromY, toX, toY, color, width, type) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      if (type === 'rect') {
        const startX = Math.min(fromX, toX);
        const startY = Math.min(fromY, toY);
        const w = Math.abs(toX - fromX);
        const h = Math.abs(toY - fromY);
        ctx.beginPath();
        ctx.rect(startX, startY, w, h);
        ctx.stroke();
      } else if (type === 'circle') {
        const startX = Math.min(fromX, toX);
        const startY = Math.min(fromY, toY);
        const w = Math.abs(toX - fromX);
        const h = Math.abs(toY - fromY);
        ctx.beginPath();
        ctx.ellipse(startX + w / 2, startY + h / 2, w / 2, h / 2, 0, 0, 2 * Math.PI);
        ctx.stroke();
      } else if (type === 'line') {
        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.stroke();
      }
      ctx.restore();
    }

    // キャンバスサイズ初期化と配置調整
    function setupCanvasSize(width, height) {
      el.canvasWrapper.style.width = '100%';
      el.canvasWrapper.style.maxWidth = '100%';
      el.canvasWrapper.style.aspectRatio = `${width} / ${height}`;
      el.canvasWrapper.classList.remove('hidden');
      el.initialGuidance.classList.add('hidden');
      el.btnReset.classList.remove('hidden');
      el.editingSection.classList.remove('hidden');
      el.pasteGuide.classList.remove('hidden');
      
      state.hasImage = true;

      // 各3層キャンバスのサイズを設定
      [el.baseCanvas, el.drawingCanvas, el.previewCanvas].forEach(canvas => {
        canvas.width = width;
        canvas.height = height;
      });

      resizeObserver.observe(el.baseCanvas);
      setTimeout(updateScale, 50);
    }

    // ページデータをキャンバスにロード
    function loadPageToCanvas(pageData) {
      setupCanvasSize(pageData.width, pageData.height);
      const img = new Image();
      img.onload = () => {
        const ctx = el.baseCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, pageData.width, pageData.height);
        ctx.drawImage(img, 0, 0);
        
        const pIdx = state.currentPageIndex;
        // 履歴の初期化（未構築のページのみ）
        if (!state.history[pIdx] || state.history[pIdx].length === 0) {
          state.history[pIdx] = [];
          state.historyIndex[pIdx] = -1;
          saveHistory();
        } else {
          // すでに履歴がある場合は現在の履歴位置の画像を描画
          const imgData = state.history[pIdx][state.historyIndex[pIdx]];
          ctx.putImageData(imgData, 0, 0);
        }
        updateHistoryButtons();
      };
      img.src = pageData.dataUrl;
    }

    // ページ切り替え
    function handlePageChange(newIndex) {
      if (newIndex < 0 || newIndex >= state.pages.length) return;
      
      state.isProcessing = true;
      el.processingOverlay.classList.remove('hidden');
      
      setTimeout(() => {
        const baseCanvas = el.baseCanvas;
        const dataUrl = baseCanvas.toDataURL('image/jpeg', 0.85);
        
        state.pages[state.currentPageIndex].dataUrl = dataUrl;
        state.currentPageIndex = newIndex;
        
        loadPageToCanvas(state.pages[newIndex]);
        
        // ラベル更新
        el.pageProgressLabel.textContent = `${newIndex + 1} / ${state.pages.length}`;
        
        // ページ送りボタン有効性調整
        el.btnPrevPage.disabled = newIndex === 0;
        el.btnNextPage.disabled = newIndex === state.pages.length - 1;
        
        state.isProcessing = false;
        el.processingOverlay.classList.add('hidden');
        clearMask();
      }, 50);
    }

    // ファイル処理
    async function processFile(file) {
      state.isProcessing = true;
      el.processingOverlay.classList.remove('hidden');
      state.hasImage = false;

      try {
        if (file.type === 'application/pdf') {
          const fileReader = new FileReader();
          fileReader.onload = async function() {
            try {
              const typedarray = new Uint8Array(this.result);
              const pdfjs = window.pdfjsLib || window['pdfjs-dist/build/pdf'];
              const pdf = await pdfjs.getDocument(typedarray).promise;
              const numPages = pdf.numPages;
              
              const newPages = [];
              const tempCanvas = document.createElement('canvas');
              const tempCtx = tempCanvas.getContext('2d');
              
              for (let i = 1; i <= numPages; i++) {
                const page = await pdf.getPage(i);
                // スケール 4.0 で超高画質描画を維持
                const viewport = page.getViewport({ scale: 4.0 });
                const originalViewport = page.getViewport({ scale: 1.0 });
                
                tempCanvas.width = viewport.width;
                tempCanvas.height = viewport.height;
                
                tempCtx.fillStyle = '#ffffff';
                tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                
                await page.render({
                  canvasContext: tempCtx,
                  viewport: viewport
                }).promise;
                
                newPages.push({
                  width: viewport.width,
                  height: viewport.height,
                  originalWidth: originalViewport.width,
                  originalHeight: originalViewport.height,
                  dataUrl: tempCanvas.toDataURL('image/jpeg', 0.85)
                });
              }
              
              state.pages = newPages;
              state.currentPageIndex = 0;
              state.history = [];
              state.historyIndex = [];
              
              loadPageToCanvas(newPages[0]);
              
              // 複数ページナビゲーションの表示判定
              if (newPages.length > 1) {
                el.pageNavigation.classList.remove('hidden');
                el.pageProgressLabel.textContent = `1 / ${newPages.length}`;
                el.btnPrevPage.disabled = true;
                el.btnNextPage.disabled = false;
              } else {
                el.pageNavigation.classList.add('hidden');
              }
              
              state.isProcessing = false;
              el.processingOverlay.classList.add('hidden');
            } catch(err) {
              console.error(err);
              alert("PDFの読み込みに失敗しました。");
              state.isProcessing = false;
              el.processingOverlay.classList.add('hidden');
            }
          };
          fileReader.readAsArrayBuffer(file);
        } else if (file.type.startsWith('image/')) {
          const img = new Image();
          img.onload = () => {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = img.width;
            tempCanvas.height = img.height;
            const ctx = tempCanvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            ctx.drawImage(img, 0, 0);
            
            const newPage = {
              width: img.width,
              height: img.height,
              originalWidth: img.width,
              originalHeight: img.height,
              dataUrl: tempCanvas.toDataURL('image/jpeg', 0.85)
            };
            
            state.pages = [newPage];
            state.currentPageIndex = 0;
            state.history = [];
            state.historyIndex = [];
            
            loadPageToCanvas(newPage);
            el.pageNavigation.classList.add('hidden');
            
            state.isProcessing = false;
            el.processingOverlay.classList.add('hidden');
          };
          img.onerror = () => {
            alert("画像の読み込みに失敗しました。");
            state.isProcessing = false;
            el.processingOverlay.classList.add('hidden');
          };
          img.src = URL.createObjectURL(file);
        } else {
          alert("サポートされていないファイル形式です。");
          state.isProcessing = false;
          el.processingOverlay.classList.add('hidden');
        }
      } catch (err) {
        console.error(err);
        state.isProcessing = false;
        el.processingOverlay.classList.add('hidden');
      }
    }

    // クリップボードからの貼り付け(ペースト)対応
    window.addEventListener('paste', (e) => {
      if (!state.hasImage || state.isProcessing) return;
      if (!e.clipboardData) return;
      
      const items = e.clipboardData.items;
      let imageFile = null;
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
          imageFile = items[i].getAsFile();
          break;
        }
      }
      
      if (imageFile) {
        const img = new Image();
        img.onload = () => {
          const canvas = el.baseCanvas;
          let width = img.width;
          let height = img.height;
          
          // 初期サイズはキャンバスの半分を上限とする
          const maxWidth = canvas.width * 0.5;
          const maxHeight = canvas.height * 0.5;
          
          if (width > maxWidth || height > maxHeight) {
            const ratio = Math.min(maxWidth / width, maxHeight / height);
            width *= ratio;
            height *= ratio;
          }
          
          state.pastedImageTransform = {
            x: (canvas.width - width) / 2,
            y: (canvas.height - height) / 2,
            width: width,
            height: height
          };
          state.pastedImage = img;
          drawPastedImage();
        };
        img.src = URL.createObjectURL(imageFile);
      }
    });

    // ペースト画像のプレビュー描画
    function drawPastedImage() {
      const pCanvas = el.previewCanvas;
      if (!pCanvas) return;
      const pCtx = pCanvas.getContext('2d');
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

      if (!state.pastedImage) return;

      const { x, y, width, height } = state.pastedImageTransform;
      
      pCtx.save();
      pCtx.drawImage(state.pastedImage, x, y, width, height);
      
      // 枠線とリサイズハンドルを描画
      const handleSize = 12 / state.displayScale;
      pCtx.strokeStyle = '#4f46e5';
      pCtx.lineWidth = 2 / state.displayScale;
      pCtx.strokeRect(x, y, width, height);
      
      pCtx.fillStyle = '#ffffff';
      const handles = [
        { hx: x, hy: y },
        { hx: x + width, hy: y },
        { hx: x, hy: y + height },
        { hx: x + width, hy: y + height }
      ];
      
      handles.forEach(({ hx, hy }) => {
        pCtx.fillRect(hx - handleSize/2, hy - handleSize/2, handleSize, handleSize);
        pCtx.strokeRect(hx - handleSize/2, hy - handleSize/2, handleSize, handleSize);
      });
      
      pCtx.restore();
    }

    // マウス/タッチ位置が貼り付け画像のパーツにヒットしているか検出
    function checkPastedImageHit(pos) {
      if (!state.pastedImageTransform) return { hit: 'none' };
      const { x, y, width, height } = state.pastedImageTransform;
      const handleSize = 16 / state.displayScale;
      
      const handles = [
        { id: 'nw', hx: x, hy: y },
        { id: 'ne', hx: x + width, hy: y },
        { id: 'sw', hx: x, hy: y + height },
        { id: 'se', hx: x + width, hy: y + height }
      ];
      
      for (let h of handles) {
        if (pos.x >= h.hx - handleSize && pos.x <= h.hx + handleSize &&
            pos.y >= h.hy - handleSize && pos.y <= h.hy + handleSize) {
          return { hit: 'handle', id: h.id };
        }
      }
      
      if (pos.x >= x && pos.x <= x + width && pos.y >= y && pos.y <= y + height) {
        return { hit: 'image' };
      }
      
      return { hit: 'none' };
    }

    // イベント座標計算の補正
    function getCoordinates(e) {
      const canvas = el.previewCanvas;
      if (!canvas) return null;
      
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      
      let clientX, clientY;
      
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    // 描画サイクル(イベント駆動)

    function startDrawing(e) {
      if (e.cancelable) e.preventDefault();
      if (!state.hasImage || state.isProcessing) return;
      
      const pos = getCoordinates(e);
      if (!pos) return;

      // ペースト画像操作中の特別分岐
      if (state.pastedImage) {
        const hitResult = checkPastedImageHit(pos);
        if (hitResult.hit === 'none') {
          // 画像外をクリックで焼き付け
          const bCtx = el.baseCanvas.getContext('2d');
          const { x, y, width, height } = state.pastedImageTransform;
          bCtx.drawImage(state.pastedImage, x, y, width, height);
          saveHistory();
          state.pastedImage = null;
          
          const pCtx = el.previewCanvas.getContext('2d');
          pCtx.clearRect(0, 0, el.previewCanvas.width, el.previewCanvas.height);
        } else {
          // 移動、リサイズを検出
          state.isDrawing = true;
          state.pastedImageInteraction = {
            type: hitResult.hit,
            handle: hitResult.id,
            startX: pos.x,
            startY: pos.y,
            startTx: state.pastedImageTransform.x,
            startTy: state.pastedImageTransform.y,
            startTw: state.pastedImageTransform.width,
            startTh: state.pastedImageTransform.height
          };
        }
        return;
      }

      state.isDrawing = true;
      state.startPos = pos;
      
      if (state.selectionMode === 'number' || state.selectionMode === 'text') {
        draw(e);
      }
    }

    function draw(e) {
      if (e.cancelable) e.preventDefault();
      if (!state.hasImage) return;
      
      const pos = getCoordinates(e);
      if (!pos) return;

      // 貼り付け画像の調整中描画
      if (state.pastedImage) {
        if (!state.isDrawing) {
          const hitResult = checkPastedImageHit(pos);
          if (hitResult.hit === 'handle') {
            if (hitResult.id === 'nw' || hitResult.id === 'se') {
              el.previewCanvas.style.cursor = 'nwse-resize';
            } else {
              el.previewCanvas.style.cursor = 'nesw-resize';
            }
          } else if (hitResult.hit === 'image') {
            el.previewCanvas.style.cursor = 'move';
          } else {
            el.previewCanvas.style.cursor = 'default';
          }
          return;
        }

        const dx = pos.x - state.pastedImageInteraction.startX;
        const dy = pos.y - state.pastedImageInteraction.startY;
        
        let { startTx, startTy, startTw, startTh, handle } = state.pastedImageInteraction;
        
        if (state.pastedImageInteraction.type === 'image') {
          state.pastedImageTransform.x = startTx + dx;
          state.pastedImageTransform.y = startTy + dy;
        } else if (state.pastedImageInteraction.type === 'handle') {
          const ratio = startTw / startTh;
          let newWidth = startTw;
          let newHeight = startTh;
          let newX = startTx;
          let newY = startTy;

          if (handle === 'se') {
            newWidth = startTw + dx;
            newHeight = newWidth / ratio;
          } else if (handle === 'sw') {
            newWidth = startTw - dx;
            newHeight = newWidth / ratio;
            newX = startTx + dx;
          } else if (handle === 'ne') {
            newWidth = startTw + dx;
            newHeight = newWidth / ratio;
            newY = startTy + startTh - newHeight;
          } else if (handle === 'nw') {
            newWidth = startTw - dx;
            newHeight = newWidth / ratio;
            newX = startTx + dx;
            newY = startTy + startTh - newHeight;
          }
          
          if (newWidth > 10 && newHeight > 10) {
            state.pastedImageTransform = { x: newX, y: newY, width: newWidth, height: newHeight };
          }
        }
        drawPastedImage();
        return;
      }

      if (!state.isDrawing) return;

      const pCanvas = el.previewCanvas;
      const pCtx = pCanvas.getContext('2d');
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
      
      if (state.selectionMode === 'rectangle') {
        const startX = state.startPos.x;
        const startY = state.startPos.y;
        const width = pos.x - startX;
        const height = pos.y - startY;
        
        pCtx.fillStyle = 'rgba(255, 0, 100, 0.4)';
        pCtx.fillRect(startX, startY, width, height);
        pCtx.strokeStyle = 'rgba(255, 0, 100, 0.8)';
        pCtx.lineWidth = 2;
        pCtx.strokeRect(startX, startY, width, height);
      } else if (state.selectionMode === 'arrow') {
        drawArrowGeometry(pCtx, state.startPos.x, state.startPos.y, pos.x, pos.y, state.arrowColor, state.arrowSize, state.arrowType, state.arrowCurviness);
      } else if (state.selectionMode === 'number') {
        drawNumberStamp(pCtx, pos.x, pos.y, state.selectedNumber, state.arrowColor, state.numberSize);
      } else if (state.selectionMode === 'text') {
        drawTextStamp(pCtx, pos.x, pos.y, state.textValue, state.arrowColor, state.textSize, state.selectedFont);
      } else if (state.selectionMode === 'shape') {
        drawShapeGeometry(pCtx, state.startPos.x, state.startPos.y, pos.x, pos.y, state.arrowColor, state.shapeSize, state.shapeType);
      }
      
      state.lastPos = pos;
    }

    function stopDrawing(e) {
      if (e && e.cancelable) e.preventDefault();
      if (!state.isDrawing) return;
      
      state.isDrawing = false;
      
      if (state.pastedImage) {
        state.pastedImageInteraction.type = 'none';
        return;
      }

      const pCanvas = el.previewCanvas;
      const pCtx = pCanvas.getContext('2d');
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
      
      if (state.selectionMode === 'rectangle') {
        const maskCanvas = el.drawingCanvas;
        const maskCtx = maskCanvas.getContext('2d');
        const startX = state.startPos.x;
        const startY = state.startPos.y;
        const width = state.lastPos.x - startX;
        const height = state.lastPos.y - startY;
        
        maskCtx.fillStyle = 'rgba(255, 0, 100, 0.4)';
        maskCtx.fillRect(startX, startY, width, height);
        maskCtx.strokeStyle = 'rgba(255, 0, 100, 0.8)';
        maskCtx.lineWidth = 2;
        maskCtx.strokeRect(startX, startY, width, height);

        state.erasureRects.push({
          x: Math.min(startX, state.lastPos.x),
          y: Math.min(startY, state.lastPos.y),
          width: Math.abs(width),
          height: Math.abs(height)
        });
      } else {
        const baseCtxInstance = el.baseCanvas.getContext('2d');
        if (state.selectionMode === 'arrow') {
          drawArrowGeometry(baseCtxInstance, state.startPos.x, state.startPos.y, state.lastPos.x, state.lastPos.y, state.arrowColor, state.arrowSize, state.arrowType, state.arrowCurviness);
        } else if (state.selectionMode === 'number') {
          drawNumberStamp(baseCtxInstance, state.lastPos.x, state.lastPos.y, state.selectedNumber, state.arrowColor, state.numberSize);
        } else if (state.selectionMode === 'text') {
          drawTextStamp(baseCtxInstance, state.lastPos.x, state.lastPos.y, state.textValue, state.arrowColor, state.textSize, state.selectedFont);
        } else if (state.selectionMode === 'shape') {
          drawShapeGeometry(baseCtxInstance, state.startPos.x, state.startPos.y, state.lastPos.x, state.lastPos.y, state.arrowColor, state.shapeSize, state.shapeType);
        }
        saveHistory();
      }
    }

    // 囲んだ部分を消去（OpenCV Inpaint）の処理
    function handleErase() {
      if (!state.hasImage || state.isProcessing) return;
      if (state.erasureRects.length === 0) {
        alert("消去する部分をなぞって選択してください。");
        return;
      }

      state.isProcessing = true;
      el.processingOverlay.classList.remove('hidden');

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          try {
            const cv = window.cv;
            const baseCanvas = el.baseCanvas;
            const drawingCanvas = el.drawingCanvas;
            const width = baseCanvas.width;
            const height = baseCanvas.height;

            // ROIの最小外接矩形を計算
            let minX = width, minY = height, maxX = 0, maxY = 0;
            for (const r of state.erasureRects) {
              if (r.x < minX) minX = r.x;
              if (r.y < minY) minY = r.y;
              if (r.x + r.width > maxX) maxX = r.x + r.width;
              if (r.y + r.height > maxY) maxY = r.y + r.height;
            }

            const padding = 20;
            minX = Math.max(0, Math.floor(minX) - padding);
            minY = Math.max(0, Math.floor(minY) - padding);
            maxX = Math.min(width - 1, Math.ceil(maxX) + padding);
            maxY = Math.min(height - 1, Math.ceil(maxY) + padding);

            const roiWidth = maxX - minX + 1;
            const roiHeight = maxY - minY + 1;

            if (roiWidth <= 0 || roiHeight <= 0) {
              throw new Error("Invalid ROI Dimension");
            }

            const baseCtx = baseCanvas.getContext('2d');
            const baseImgData = baseCtx.getImageData(minX, minY, roiWidth, roiHeight);
            let srcRoi = cv.matFromImageData(baseImgData);
            cv.cvtColor(srcRoi, srcRoi, cv.COLOR_RGBA2RGB);

            const drawCtx = drawingCanvas.getContext('2d');
            const maskImgData = drawCtx.getImageData(minX, minY, roiWidth, roiHeight);
            let maskRoi = new cv.Mat(roiHeight, roiWidth, cv.CV_8UC1);
            
            for (let i = 0; i < maskImgData.data.length; i += 4) {
              maskRoi.data[i / 4] = maskImgData.data[i + 3] > 0 ? 255 : 0;
            }

            let dstRoi = new cv.Mat();
            cv.inpaint(srcRoi, maskRoi, dstRoi, 5, cv.INPAINT_TELEA);

            cv.cvtColor(dstRoi, dstRoi, cv.COLOR_RGB2RGBA);
            
            const dstImgData = new ImageData(new Uint8ClampedArray(dstRoi.data), roiWidth, roiHeight);
            baseCtx.putImageData(dstImgData, minX, minY);

            saveHistory();
            clearMask();

            srcRoi.delete();
            maskRoi.delete();
            dstRoi.delete();
            
          } catch (error) {
            console.error("画像処理エラー:", error);
            alert("画像処理中にエラーが発生しました。選択範囲が大きすぎないか、または対象画像が存在するかを確認してください。");
          } finally {
            state.isProcessing = false;
            el.processingOverlay.classList.add('hidden');
          }
        });
      });
    }

    function clearMask() {
      if (!state.hasImage) return;
      
      const canvas = el.drawingCanvas;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const pCanvas = el.previewCanvas;
      const pCtx = pCanvas.getContext('2d');
      pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
      
      state.erasureRects = [];
    }

    // PDFエクスポート
    function exportPDF() {
      if (!state.hasImage) return;
      state.isProcessing = true;
      el.processingOverlay.classList.remove('hidden');
      
      setTimeout(async () => {
        try {
          const { jsPDF } = window.jspdf;
          
          const baseCanvas = el.baseCanvas;
          const currentDataUrl = baseCanvas.toDataURL('image/jpeg', 0.85);
          const exportPages = [...state.pages];
          exportPages[state.currentPageIndex].dataUrl = currentDataUrl;
          
          let pdf = null;
          
          for (let i = 0; i < exportPages.length; i++) {
            const page = exportPages[i];
            const pdfWidth = page.originalWidth || page.width;
            const pdfHeight = page.originalHeight || page.height;
            const orientation = pdfWidth > pdfHeight ? 'landscape' : 'portrait';
            
            if (i === 0) {
              pdf = new jsPDF({
                orientation: orientation,
                unit: 'pt',
                format: [pdfWidth, pdfHeight]
              });
            } else {
              pdf.addPage([pdfWidth, pdfHeight], orientation);
            }

            const compressedDataUrl = await new Promise((resolve) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width * 0.35;
                canvas.height = img.height * 0.35;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.85));
              };
              img.src = page.dataUrl;
            });

            pdf.addImage(compressedDataUrl, 'JPEG', 0, 0, pdfWidth, pdfHeight);
          }
          
          pdf.save("edited_document.pdf");
        } catch (error) {
          console.error(error);
          alert("PDFの保存に失敗しました。");
        } finally {
          state.isProcessing = false;
          el.processingOverlay.classList.add('hidden');
        }
      }, 50);
    }

    // PowerPointエクスポート
    function exportPPTX() {
      if (!state.hasImage) return;
      state.isProcessing = true;
      el.processingOverlay.classList.remove('hidden');

      setTimeout(async () => {
        try {
          const pptx = new window.PptxGenJS();
          
          const baseCanvas = el.baseCanvas;
          const currentDataUrl = baseCanvas.toDataURL('image/jpeg', 0.85);
          const exportPages = [...state.pages];
          exportPages[state.currentPageIndex].dataUrl = currentDataUrl;
          
          for (let i = 0; i < exportPages.length; i++) {
            const page = exportPages[i];
            const slide = pptx.addSlide();

            const compressedDataUrl = await new Promise((resolve) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width * 0.35;
                canvas.height = img.height * 0.35;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.85));
              };
              img.src = page.dataUrl;
            });

            slide.addImage({
              data: compressedDataUrl,
              x: 0, y: 0,
              w: '100%', h: '100%',
              sizing: { type: 'contain', w: 10, h: 5.625 }
            });
          }
          
          pptx.writeFile({ fileName: 'edited_document.pptx' });
        } catch (error) {
          console.error(error);
          alert("PowerPointの保存に失敗しました。");
        } finally {
          state.isProcessing = false;
          el.processingOverlay.classList.add('hidden');
        }
      }, 50);
    }

    // コントロール類の動作イベント定義
    function setupInitialControls() {
      
      // ファイルインプット
      el.fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          processFile(file);
        }
        el.fileInput.value = '';
      });

      // ドラッグ＆ドロップ
      const preventDefaults = (e) => {
        e.preventDefault();
        e.stopPropagation();
      };
      
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        el.dropZone.addEventListener(eventName, preventDefaults, false);
        el.initialGuidance.addEventListener(eventName, preventDefaults, false);
        el.canvasContainer.addEventListener(eventName, preventDefaults, false);
      });

      const highlight = () => {
        el.dropZone.classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-700', 'scale-102', 'shadow-md');
        el.initialGuidance.classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-700', 'scale-102', 'shadow-md');
      };

      const unhighlight = () => {
        el.dropZone.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-700', 'scale-102', 'shadow-md');
        el.initialGuidance.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-700', 'scale-102', 'shadow-md');
      };

      ['dragenter', 'dragover'].forEach(eventName => {
        el.dropZone.addEventListener(eventName, highlight, false);
        el.initialGuidance.addEventListener(eventName, highlight, false);
      });

      ['dragleave', 'drop'].forEach(eventName => {
        el.dropZone.addEventListener(eventName, unhighlight, false);
        el.initialGuidance.addEventListener(eventName, unhighlight, false);
      });

      const handleDrop = (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files && files.length > 0) {
          processFile(files[0]);
        }
      };

      el.dropZone.addEventListener('drop', handleDrop, false);
      el.initialGuidance.addEventListener('drop', handleDrop, false);
      
      el.dropZone.addEventListener('click', () => el.fileInput.click());
      el.initialGuidance.addEventListener('click', () => el.fileInput.click());

      // ツール選択変更
      document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tool-btn').forEach(b => {
            b.classList.remove('bg-indigo-50', 'border-indigo-500', 'text-indigo-700', 'shadow-sm');
            b.classList.add('bg-white', 'border-gray-200', 'text-gray-600', 'hover:bg-gray-50');
          });
          
          btn.classList.remove('bg-white', 'border-gray-200', 'text-gray-600', 'hover:bg-gray-50');
          btn.classList.add('bg-indigo-50', 'border-indigo-500', 'text-indigo-700', 'shadow-sm');
          
          state.selectionMode = btn.getAttribute('data-mode');
          clearMask();
          updateActivePanels();
        });
      });

      // アンドゥ・リドゥ
      el.btnUndo.addEventListener('click', () => {
        const pIdx = state.currentPageIndex;
        if (state.historyIndex[pIdx] > 0) {
          state.historyIndex[pIdx] -= 1;
          const imgData = state.history[pIdx][state.historyIndex[pIdx]];
          const ctx = el.baseCanvas.getContext('2d');
          ctx.putImageData(imgData, 0, 0);
          updateHistoryButtons();
          clearMask();
        }
      });

      el.btnRedo.addEventListener('click', () => {
        const pIdx = state.currentPageIndex;
        const historyList = state.history[pIdx] || [];
        if (state.historyIndex[pIdx] < historyList.length - 1) {
          state.historyIndex[pIdx] += 1;
          const imgData = state.history[pIdx][state.historyIndex[pIdx]];
          const ctx = el.baseCanvas.getContext('2d');
          ctx.putImageData(imgData, 0, 0);
          updateHistoryButtons();
          clearMask();
        }
      });

      // 消去
      el.btnErase.addEventListener('click', handleErase);
      el.btnResetSelection.addEventListener('click', clearMask);
      
      // 最初からやり直す
      el.btnReset.addEventListener('click', () => {
        state.hasImage = false;
        state.pages = [];
        state.currentPageIndex = 0;
        state.history = [];
        state.historyIndex = [];
        state.pastedImage = null;
        clearMask();
        
        el.canvasWrapper.classList.add('hidden');
        el.initialGuidance.classList.remove('hidden');
        el.btnReset.classList.add('hidden');
        el.editingSection.classList.add('hidden');
        el.pageNavigation.classList.add('hidden');
        el.pasteGuide.classList.add('hidden');
        resizeObserver.disconnect();
      });

      // ページ遷移
      el.btnPrevPage.addEventListener('click', () => handlePageChange(state.currentPageIndex - 1));
      el.btnNextPage.addEventListener('click', () => handlePageChange(state.currentPageIndex + 1));
      el.btnToggleNavPosition.addEventListener('click', () => {
        if (state.pageNavPosition === 'bottom') {
          state.pageNavPosition = 'top';
          el.pageNavigation.classList.remove('bottom-10');
          el.pageNavigation.classList.add('top-10');
        } else {
          state.pageNavPosition = 'bottom';
          el.pageNavigation.classList.remove('top-10');
          el.pageNavigation.classList.add('bottom-10');
        }
      });

      // エクスポート
      el.btnExportPdf.addEventListener('click', exportPDF);
      el.btnExportPptx.addEventListener('click', exportPPTX);

      // 矢印設定の変更トリガー
      el.arrowTypeStraight.addEventListener('click', () => {
        state.arrowType = 'straight';
        el.arrowTypeStraight.className = 'flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-indigo-600 border-indigo-600 text-white';
        el.arrowTypeCurved.className = 'flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-white border-gray-200 text-gray-600 hover:bg-gray-50';
        el.curvedSetting.classList.add('hidden');
        updateArrowPreview();
      });

      el.arrowTypeCurved.addEventListener('click', () => {
        state.arrowType = 'curved';
        el.arrowTypeCurved.className = 'flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-indigo-600 border-indigo-600 text-white';
        el.arrowTypeStraight.className = 'flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-white border-gray-200 text-gray-600 hover:bg-gray-50';
        el.curvedSetting.classList.remove('hidden');
        updateArrowPreview();
      });

      el.arrowCurviness.addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        state.arrowCurviness = val;
        el.curvinessLabel.textContent = val > 0 ? `右曲がり (+${val})` : val < 0 ? `左曲がり (${val})` : '直線 (0)';
        updateArrowPreview();
      });

      el.arrowColor.addEventListener('input', (e) => {
        state.arrowColor = e.target.value;
        updateArrowPreview();
      });

      el.arrowSize.addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        state.arrowSize = val;
        el.arrowSizeLabel.textContent = `${val}px`;
        updateArrowPreview();
      });

      // 数字スタンプの初期生成
      const numbers = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧', '⑨', '⑩'];
      if (el.numberSelectorContainer) {
        el.numberSelectorContainer.innerHTML = ''; // 重複生成を防ぐ
        numbers.forEach(num => {
          const btn = document.createElement('button');
          btn.className = `py-1 rounded text-sm font-bold border transition ${state.selectedNumber === num ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-gray-200 text-gray-700 hover:bg-gray-50'}`;
          btn.textContent = num;
          btn.addEventListener('click', () => {
            state.selectedNumber = num;
            document.querySelectorAll('#numberSelectorContainer button').forEach(b => {
              b.className = 'py-1 rounded text-sm font-bold border transition bg-white border-gray-200 text-gray-700 hover:bg-gray-50';
            });
            btn.className = 'py-1 rounded text-sm font-bold border transition bg-indigo-600 border-indigo-600 text-white';
            updateNumberPreview();
          });
          el.numberSelectorContainer.appendChild(btn);
        });
      }

      el.numberColor.addEventListener('input', (e) => {
        state.arrowColor = e.target.value; // 共用
        updateNumberPreview();
      });

      el.numberSize.addEventListener('input', (e) => {
        state.numberSize = parseInt(e.target.value);
        el.numberSizeLabel.textContent = `${state.numberSize}px`;
        updateNumberPreview();
      });

      // テキスト入力変更トリガー
      el.textValue.addEventListener('input', (e) => {
        state.textValue = e.target.value;
        updateTextPreview();
      });

      el.textFont.addEventListener('change', (e) => {
        state.selectedFont = e.target.value;
        updateTextPreview();
      });

      el.textColor.addEventListener('input', (e) => {
        state.arrowColor = e.target.value; // 共用
        updateTextPreview();
      });

      el.textSize.addEventListener('input', (e) => {
        state.textSize = parseInt(e.target.value);
        el.textSizeLabel.textContent = `${state.textSize}px`;
        updateTextPreview();
      });

      // 図形タイプボタン
      document.querySelectorAll('.shape-type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.shape-type-btn').forEach(b => {
            b.className = 'flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-white border-gray-200 text-gray-600 hover:bg-gray-50';
          });
          btn.className = 'flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-indigo-600 border-indigo-600 text-white';
          state.shapeType = btn.getAttribute('data-shape');
          updateShapePreview();
        });
      });

      el.shapeColor.addEventListener('input', (e) => {
        state.arrowColor = e.target.value; // 共用
        updateShapePreview();
      });

      el.shapeSize.addEventListener('input', (e) => {
        state.shapeSize = parseInt(e.target.value);
        el.shapeSizeLabel.textContent = `${state.shapeSize}px`;
        updateShapePreview();
      });

      // キャンバスイベント設定 (マウスおよびタッチ)
      const targetCanvas = el.previewCanvas;
      targetCanvas.addEventListener('mousedown', startDrawing);
      targetCanvas.addEventListener('mousemove', draw);
      targetCanvas.addEventListener('mouseup', stopDrawing);
      targetCanvas.addEventListener('mouseleave', stopDrawing);
      
      targetCanvas.addEventListener('touchstart', startDrawing, { passive: false });
      targetCanvas.addEventListener('touchmove', draw, { passive: false });
      targetCanvas.addEventListener('touchend', stopDrawing, { passive: false });
    }

    // パネル表示切り替え
    function updateActivePanels() {
      const mode = state.selectionMode;
      el.panelArrow.classList.add('hidden');
      el.panelNumber.classList.add('hidden');
      el.panelText.classList.add('hidden');
      el.panelShape.classList.add('hidden');
      
      el.btnErase.classList.add('hidden');
      el.btnResetSelection.classList.add('hidden');

      if (mode === 'arrow') {
        el.panelArrow.classList.remove('hidden');
        updateArrowPreview();
      } else if (mode === 'number') {
        el.panelNumber.classList.remove('hidden');
        updateNumberPreview();
      } else if (mode === 'text') {
        el.panelText.classList.remove('hidden');
        updateTextPreview();
      } else if (mode === 'shape') {
        el.panelShape.classList.remove('hidden');
        updateShapePreview();
      } else {
        el.btnErase.classList.remove('hidden');
        el.btnResetSelection.classList.remove('hidden');
      }
    }

    // プレビュー表示の更新

    function updateArrowPreview() {
      const svgMarker = document.querySelector('#arrowhead-preview polygon');
      if (svgMarker) svgMarker.setAttribute('fill', state.arrowColor);
      
      if (state.arrowType === 'straight') {
        el.previewLine.classList.remove('hidden');
        el.previewCurve.classList.add('hidden');
        
        el.previewLine.setAttribute('stroke', state.arrowColor);
        el.previewLine.setAttribute('stroke-width', state.arrowSize * state.displayScale);
      } else {
        el.previewLine.classList.add('hidden');
        el.previewCurve.classList.remove('hidden');
        
        const offset = 140 * (state.arrowCurviness / 180) * 0.75;
        el.previewCurve.setAttribute('d', `M 30 50 Q 100 ${50 + offset} 170 50`);
        el.previewCurve.setAttribute('stroke', state.arrowColor);
        el.previewCurve.setAttribute('stroke-width', state.arrowSize * state.displayScale);
      }
    }

    function updateNumberPreview() {
      el.numberPreviewText.style.color = state.arrowColor;
      el.numberPreviewText.style.fontSize = `${state.numberSize * state.displayScale}px`;
      el.numberPreviewText.textContent = state.selectedNumber;
    }

    function updateTextPreview() {
      el.textPreviewText.style.color = state.arrowColor;
      el.textPreviewText.style.fontSize = `${state.textSize * state.displayScale}px`;
      el.textPreviewText.style.fontFamily = state.selectedFont;
      el.textPreviewText.textContent = state.textValue || 'テキスト';
    }

    function updateShapePreview() {
      el.previewShapeRect.classList.add('hidden');
      el.previewShapeCircle.classList.add('hidden');
      el.previewShapeLine.classList.add('hidden');

      if (state.shapeType === 'rect') {
        el.previewShapeRect.classList.remove('hidden');
        el.previewShapeRect.setAttribute('stroke', state.arrowColor);
        el.previewShapeRect.setAttribute('stroke-width', state.shapeSize * state.displayScale);
      } else if (state.shapeType === 'circle') {
        el.previewShapeCircle.classList.remove('hidden');
        el.previewShapeCircle.setAttribute('stroke', state.arrowColor);
        el.previewShapeCircle.setAttribute('stroke-width', state.shapeSize * state.displayScale);
      } else if (state.shapeType === 'line') {
        el.previewShapeLine.classList.remove('hidden');
        el.previewShapeLine.setAttribute('stroke', state.arrowColor);
        el.previewShapeLine.setAttribute('stroke-width', state.shapeSize * state.displayScale);
      }
    }
  </script>
</body>
</html>
