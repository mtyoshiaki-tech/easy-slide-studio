<!DOCTYPE html>
<html lang="ja">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>サクッと編集アプリ</title>
 
 <!-- Tailwind CSS -->
 <script src="https://cdn.tailwindcss.com"></script>
 
 <!-- Google Fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Mochiy+Pop+One&family=Rampart+One&display=swap" rel="stylesheet">
 
 <style>
 body { font-family: sans-serif; overflow: hidden; }
 .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
 @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
 
 /* スライダーのカスタマイズ */
 input[type=range] { -webkit-appearance: none; background: transparent; }
 input[type=range]::-webkit-slider-thumb {
 -webkit-appearance: none;
 height: 16px; width: 16px; border-radius: 50%;
 background: #4f46e5; cursor: pointer; margin-top: -6px;
 }
 input[type=range]::-webkit-slider-runnable-track {
 width: 100%; height: 4px; cursor: pointer;
 background: #e5e7eb; border-radius: 2px;
 }
 
 /* 非表示ユーティリティ */
 .d-none { display: none !important; }
 </style>
 <!-- Libraries -->
 <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body class="flex flex-col md:flex-row h-screen bg-gray-50 text-gray-800">
 <!-- Sidebar -->
 <aside id="sidebar" class="bg-white border-r shadow-sm flex flex-col p-5 space-y-6 overflow-y-auto z-20 flex-shrink-0 h-full relative" style="width: 320px;">
 <div class="text-2xl font-extrabold text-indigo-600 flex items-center gap-3">
 <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
 サクッと編集アプリ
 </div>
 <p class="text-sm text-gray-500 font-medium">一部を消したり、一部追加したりします。</p>
 <div id="loading-indicator" class="p-4 bg-indigo-50 border border-indigo-100 text-indigo-700 rounded-lg text-sm flex items-center gap-3 shadow-inner">
 <div class="w-4 h-4 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
 <span id="loading-text">エンジンを起動中...</span>
 </div>
 <div id="tools-container" class="space-y-6 pb-10 d-none animate-fade-in">
 
 <!-- ツール選択 -->
 <div class="space-y-3">
 <label class="block text-sm font-bold text-gray-700">1. ツール選択</label>
 
 <!-- プレビュー -->
 <div id="preview-box" class="bg-white border border-gray-200 rounded-lg p-3 relative overflow-hidden shadow-sm d-none">
 <div class="absolute top-1.5 left-2 text-[10px] font-bold text-gray-400">プレビュー</div>
 <div id="preview-content" class="h-16 mt-2 flex items-center justify-center relative w-full"></div>
 </div>
 <div class="grid grid-cols-4 gap-1.5">
 <button data-tool="arrow" class="tool-btn py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 bg-white border-gray-200 text-gray-600 hover:bg-gray-50">
 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
 矢印
 </button>
 <button data-tool="number" class="tool-btn py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 bg-white border-gray-200 text-gray-600 hover:bg-gray-50">
 <span class="text-base font-extrabold" style="line-height: 1.25rem;">①</span>数字
 </button>
 <button data-tool="shape" class="tool-btn py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 bg-white border-gray-200 text-gray-600 hover:bg-gray-50">
 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
 <rect x="4" y="4" width="10" height="10" stroke-width="2" stroke-linejoin="round" rx="1" />
 <circle cx="16" cy="16" r="5" stroke-width="2" />
 </svg>
 図形
 </button>
 <button data-tool="text" class="tool-btn py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 bg-white border-gray-200 text-gray-600 hover:bg-gray-50">
 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
 テキスト
 </button>
 </div>
 </div>
 <!-- ツール個別設定 (JSで表示切替) -->
 <div id="settings-arrow" class="tool-settings space-y-4 p-4 bg-gray-50 rounded-xl border border-gray-100 d-none">
 <div>
 <label class="block text-xs font-bold text-gray-700 mb-1.5">形状</label>
 <div class="flex gap-2">
 <button id="btn-arrow-straight" class="flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-indigo-600 border-indigo-600 text-white">直線</button>
 <button id="btn-arrow-curved" class="flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-white border-gray-200 text-gray-600 hover:bg-gray-50">曲線</button>
 </div>
 </div>
 <div id="arrow-curve-settings" class="d-none">
 <div class="flex justify-between items-center mb-1">
 <label class="block text-xs font-bold text-gray-700">曲がり具合</label>
 <span id="lbl-arrow-curve" class="text-xs text-gray-500 font-mono">右曲がり (+30)</span>
 </div>
 <input type="range" id="rng-arrow-curve" min="-180" max="180" value="30" class="w-full accent-indigo-600">
 </div>
 <div>
 <label class="block text-xs font-bold text-gray-700 mb-1">色</label>
 <input type="color" id="inp-color-arrow" value="#ff0000" class="w-full h-8 cursor-pointer border-0 p-0 rounded">
 </div>
 <div>
 <div class="flex justify-between items-center mb-1">
 <label class="block text-xs font-bold text-gray-700">太さ / 大きさ</label>
 <span id="lbl-arrow-size" class="text-xs text-gray-500">15px</span>
 </div>
 <div class="flex items-center gap-2">
 <button id="btn-arr-sz-minus" class="w-6 h-6 bg-white border rounded text-gray-600">-</button>
 <input type="range" id="rng-arrow-size" min="1" max="200" value="15" class="w-full accent-indigo-600">
 <button id="btn-arr-sz-plus" class="w-6 h-6 bg-white border rounded text-gray-600">+</button>
 </div>
 </div>
 </div>
 <div id="settings-number" class="tool-settings space-y-4 p-4 bg-gray-50 rounded-xl border border-gray-100 d-none">
 <div>
 <label class="block text-xs font-bold text-gray-700 mb-2">挿入する数字</label>
 <div class="grid grid-cols-5 gap-1.5" id="number-grid">
 <!-- JSで生成 -->
 </div>
 </div>
 <div>
 <label class="block text-xs font-bold text-gray-700 mb-1">色</label>
 <input type="color" id="inp-color-number" value="#ff0000" class="w-full h-8 cursor-pointer border-0 p-0 rounded">
 </div>
 <div>
 <div class="flex justify-between items-center mb-1">
 <label class="block text-xs font-bold text-gray-700">サイズ</label>
 <span id="lbl-number-size" class="text-xs text-gray-500">50px</span>
 </div>
 <div class="flex items-center gap-2">
 <button id="btn-num-sz-minus" class="w-6 h-6 bg-white border rounded text-gray-600">-</button>
 <input type="range" id="rng-number-size" min="10" max="500" value="50" class="w-full accent-indigo-600">
 <button id="btn-num-sz-plus" class="w-6 h-6 bg-white border rounded text-gray-600">+</button>
 </div>
 </div>
 </div>
 <div id="settings-text" class="tool-settings space-y-4 p-4 bg-gray-50 rounded-xl border border-gray-100 d-none">
 <div>
 <label class="block text-xs font-bold text-gray-700 mb-1">入力するテキスト</label>
 <div class="relative">
 <input type="text" id="inp-text-val" placeholder="テキストを入力" class="w-full pl-3 pr-8 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500">
 <button id="btn-clear-text" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition d-none" title="テキストをクリア">
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
 </button>
 </div>
 </div>
 <div class="flex gap-2 items-end">
 <div class="flex-1">
 <label class="block text-xs font-bold text-gray-700 mb-1.5">フォント</label>
 <select id="sel-text-font" class="w-full px-3 py-2 border rounded-lg text-sm bg-white">
 <option value="'BIZ UDPGothic', sans-serif">BIZ UDPGothic</option>
 <option value="'Mochiy Pop One', sans-serif">Mochiy Pop One</option>
 <option value="'Rampart One', sans-serif">Rampart One</option>
 </select>
 </div>
 <button id="btn-text-bold" class="w-[42px] h-[38px] flex justify-center items-center rounded-lg text-sm font-bold border transition bg-indigo-600 border-indigo-600 text-white">B</button>
 </div>
 <div>
 <label class="block text-xs font-bold text-gray-700 mb-1">色</label>
 <input type="color" id="inp-color-text" value="#ff0000" class="w-full h-8 cursor-pointer border-0 p-0 rounded">
 </div>
 <div>
 <div class="flex justify-between items-center mb-1">
 <label class="block text-xs font-bold text-gray-700">サイズ</label>
 <span id="lbl-text-size" class="text-xs text-gray-500">30px</span>
 </div>
 <div class="flex items-center gap-2">
 <button id="btn-txt-sz-minus" class="w-6 h-6 bg-white border rounded text-gray-600">-</button>
 <input type="range" id="rng-text-size" min="10" max="500" value="30" class="w-full accent-indigo-600">
 <button id="btn-txt-sz-plus" class="w-6 h-6 bg-white border rounded text-gray-600">+</button>
 </div>
 </div>
 </div>
 <div id="settings-shape" class="tool-settings space-y-4 p-4 bg-gray-50 rounded-xl border border-gray-100 d-none">
 <div>
 <label class="block text-xs font-bold text-gray-700 mb-1.5">形状</label>
 <div class="flex gap-2">
 <button id="btn-shape-rect" class="flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-indigo-600 border-indigo-600 text-white">四角</button>
 <button id="btn-shape-circle" class="flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-white border-gray-200 text-gray-600">丸</button>
 <button id="btn-shape-line" class="flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition bg-white border-gray-200 text-gray-600">直線</button>
 </div>
 </div>
 <div>
 <label class="block text-xs font-bold text-gray-700 mb-1">色</label>
 <input type="color" id="inp-color-shape" value="#ff0000" class="w-full h-8 cursor-pointer border-0 p-0 rounded">
 </div>
 <div>
 <div class="flex justify-between items-center mb-1">
 <label class="block text-xs font-bold text-gray-700">太さ</label>
 <span id="lbl-shape-size" class="text-xs text-gray-500">5px</span>
 </div>
 <div class="flex items-center gap-2">
 <button id="btn-shp-sz-minus" class="w-6 h-6 bg-white border rounded text-gray-600">-</button>
 <input type="range" id="rng-shape-size" min="1" max="100" value="5" class="w-full accent-indigo-600">
 <button id="btn-shp-sz-plus" class="w-6 h-6 bg-white border rounded text-gray-600">+</button>
 </div>
 </div>
 </div>
 <!-- 画像の挿入・貼り付け -->
 <div class="space-y-2 bg-gray-50 p-3.5 rounded-xl border border-gray-100">
 <label class="block text-xs font-bold text-gray-700">画像の追加・貼り付け</label>
 <div class="flex gap-2">
 <button id="btn-insert-img" class="flex-1 py-2 px-3 bg-indigo-50 border border-indigo-200 text-indigo-700 rounded-xl text-xs font-bold shadow-sm hover:bg-indigo-100 disabled:opacity-50 flex items-center justify-center gap-1.5" disabled>
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
 画像の挿入
 </button>
 <button id="btn-paste-img" class="flex-1 py-2 px-3 bg-indigo-50 border border-indigo-200 text-indigo-700 rounded-xl text-xs font-bold shadow-sm hover:bg-indigo-100 disabled:opacity-50 flex items-center justify-center gap-1.5" disabled>
 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
 貼り付け
 </button>
 <input type="file" id="inp-insert-img" accept="image/*" class="hidden">
 </div>
 </div>
 <!-- 出力 -->
 <div class="pt-6 border-t space-y-3">
 <label class="block text-sm font-bold text-gray-700 mb-2">2. 保存して出力</label>
 <button id="btn-export-pdf" class="w-full py-2.5 px-4 border-2 border-red-500 text-red-600 font-bold rounded-xl hover:bg-red-50 disabled:opacity-40 flex items-center justify-center gap-2" disabled>
 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
 PDFで保存
 </button>
 <button id="btn-export-pptx" class="w-full py-2.5 px-4 border-2 border-orange-500 text-orange-600 font-bold rounded-xl hover:bg-orange-50 disabled:opacity-40 flex items-center justify-center gap-2" disabled>
 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
 PowerPointで保存
 </button>
 </div>
 
 <button id="btn-reset" class="w-full py-2.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-xl flex justify-center items-center gap-2 text-sm border d-none">
 リセット
 </button>
 <!-- 画質設定 -->
 <div class="space-y-2 bg-gray-50 p-3.5 rounded-xl border border-gray-100">
 <div class="flex justify-between items-center">
 <label class="block text-xs font-bold text-gray-700">表示画質設定</label>
 <span id="canvas-size-info" class="text-[10px] font-mono bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded-md d-none"></span>
 </div>
 <div class="flex gap-1.5 bg-gray-200/60 p-1 rounded-lg">
 <button id="btn-qual-std" class="flex-1 py-1.5 rounded-md text-xs font-bold bg-white text-gray-800 shadow-sm">標準</button>
 <button id="btn-qual-high" class="flex-1 py-1.5 rounded-md text-xs font-bold text-gray-500 hover:text-gray-700">高画質</button>
 </div>
 <p class="text-[10px] text-gray-400 leading-tight">※動作が重く感じる場合は「標準」をお試しください。</p>
 </div>
 </div>
 </aside>
 <!-- Resizer -->
 <div id="resizer" class="hidden md:block w-1.5 hover:w-2 bg-transparent hover:bg-indigo-300 active:bg-indigo-500 cursor-col-resize z-30 flex-shrink-0 h-full transition-all duration-150 relative -ml-[3px]"></div>
 <!-- Main Area -->
 <div class="flex-1 relative flex flex-col h-screen overflow-hidden bg-gray-200">
 
 <main id="main-area" class="flex-1 overflow-auto px-4 py-16 md:px-8 md:py-24 flex items-center justify-center relative">
 
 <!-- Dropzone -->
 <div id="dropzone" class="text-gray-400 flex flex-col items-center justify-center p-10 bg-white rounded-3xl shadow-sm border border-dashed border-gray-300 max-w-md w-full cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/30 transition-all duration-200">
 <svg class="w-20 h-20 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
 <p class="text-lg font-bold text-gray-600 mb-1">ファイルをここにドラッグ&ドロップ</p>
 <p class="text-sm text-gray-400 text-center">または、クリックして画像・PDFファイルをロードしてください</p>
 </div>
 <input type="file" id="file-input" accept="image/*,application/pdf" class="hidden">
 <!-- Canvas Container -->
 <div id="canvas-container" class="relative shadow-2xl border-4 border-white bg-white touch-none shrink-0 d-none" style="width: 100%;">
 <canvas id="base-canvas" class="absolute top-0 left-0 w-full h-full block rounded-sm pointer-events-none" style="z-index: 1"></canvas>
 <canvas id="drawing-canvas" class="absolute top-0 left-0 w-full h-full block rounded-sm pointer-events-none" style="z-index: 10"></canvas>
 <canvas id="preview-canvas" class="absolute top-0 left-0 w-full h-full rounded-sm" style="z-index: 20"></canvas>
 </div>
 </main>
 <!-- Floating Toolbar -->
 <div id="floating-toolbar" class="absolute bottom-10 left-0 w-full flex justify-center z-[90] pointer-events-none d-none">
 <div id="toolbar-wrapper" class="bg-white rounded-full shadow-[0_10px_25px_-5px_rgba(0,0,0,0.3)] border border-gray-200 pointer-events-auto transition-transform duration-100 flex origin-bottom">
 <div class="flex items-center gap-4 px-5 py-2.5 whitespace-nowrap">
 
 <div class="flex items-center gap-2">
 <button id="tb-rect" class="py-2 px-4 rounded-full font-bold transition flex items-center gap-2 text-sm bg-indigo-100 text-indigo-700"><svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4h16v16H4z" /></svg>囲む</button>
 <button id="tb-erase" class="py-2 px-4 bg-indigo-600 text-white font-bold rounded-full shadow-md flex items-center gap-2 text-sm disabled:opacity-50"><svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>消去</button>
 <button id="tb-clear" class="py-2 px-4 bg-gray-100 text-gray-700 font-medium rounded-full text-sm">解除</button>
 <div class="h-6 w-px bg-gray-200 mx-1"></div>
 <button id="tb-oneclick" class="py-2 px-4 rounded-full font-bold transition flex items-center gap-2 text-sm text-gray-600 hover:bg-gray-100"><svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" /></svg>ワン消し</button>
 <button id="tb-eraser" class="py-2 px-4 rounded-full font-bold transition flex items-center gap-2 text-sm text-gray-600 hover:bg-gray-100"><svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>部分消し</button>
 </div>
 <div class="h-6 w-px bg-gray-200 mx-1"></div>
 
 <button id="tb-undo" class="p-2.5 rounded-full hover:bg-orange-50 text-orange-600 disabled:text-gray-400 disabled:opacity-30 disabled:hover:bg-transparent" disabled><svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" /></svg></button>
 <button id="tb-redo" class="p-2.5 rounded-full hover:bg-emerald-50 text-emerald-600 disabled:text-gray-400 disabled:opacity-30 disabled:hover:bg-transparent" disabled><svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 7v6h-6M3 17a9 9 0 019-9 9 9 0 016 2.3L21 13" /></svg></button>
 
 <div id="page-nav-group" class="d-none flex items-center">

 // ==========================================

 function drawArrow(ctx, fx, fy, tx, ty, color, width, type, curv) {
 const headlen = width * 3.5;
 const dx = tx - fx, dy = ty - fy;

 ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'butt';

 ctx.moveTo(fx, fy);

 ctx.stroke();
 } else {
 const mx = (fx+tx)/2, my = (fy+ty)/2;
 const offset = dist * (curv/180) * 0.75;
 const ang = Math.atan2(dy, dx);
 const cx = mx + Math.cos(ang + Math.PI/2)*offset, cy = my + Math.sin(ang + Math.PI/2)*offset;
 headAngle = Math.atan2(ty - cy, tx - cx);
 ctx.moveTo(fx, fy);
 ctx.quadraticCurveTo(cx, cy, tx - (headlen*0.5)*Math.cos(headAngle), ty - (headlen*0.5)*Math.sin(headAngle));
 ctx.stroke();
 }
 ctx.beginPath();
 ctx.moveTo(tx, ty);
 ctx.lineTo(tx - headlen*Math.cos(headAngle - Math.PI/6), ty - headlen*Math.sin(headAngle - Math.PI/6));
 ctx.lineTo(tx - headlen*Math.cos(headAngle + Math.PI/6), ty - headlen*Math.sin(headAngle + Math.PI/6));

 // ==========================================

 for(let yy=0;yy<sh;yy++){
 for(let xx=0;xx<sw;xx++){
 if (!(xx>=x-sx && xx<x-sx+rw && yy>=y-sy && yy<y-sy+rh)) {

 UI.canvasContainer.addEventListener('mousemove', onPointerMove);
 window.addEventListener('mouseup', onPointerUp);
 UI.canvasContainer.addEventListener('touchstart', onPointerDown, {passive:false});
 UI.canvasContainer.addEventListener('touchmove', onPointerMove, {passive:false});
 window.addEventListener('touchend', onPointerUp);
 // Resizer
 let isResizing = false;
 UI.resizer.onmousedown = UI.resizer.ontouchstart = (e) => { e.preventDefault(); isResizing=true; document.body.style.cursor='col-resize'; document.body.style.userSelect='none'; };
 window.addEventListener('mousemove', e => { if(isResizing) { const x = e.touches?e.touches[0].clientX:e.clientX; UI.sidebar.style.width = Math.max(200, Math.min(x, window.innerWidth*0.5)) + 'px'; updateScale(); adjustToolbarScale(); } });
 window.addEventListener('touchmove', e => { if(isResizing) { const x = e.touches?e.touches[0].clientX:e.clientX; UI.sidebar.style.width = Math.max(200, Math.min(x, window.innerWidth*0.5)) + 'px'; updateScale(); adjustToolbarScale(); } });
 window.addEventListener('mouseup', () => { if(isResizing){ isResizing=false; document.body.style.cursor=''; document.body.style.userSelect=''; } });
 window.addEventListener('touchend', () => { if(isResizing){ isResizing=false; document.body.style.cursor=''; document.body.style.userSelect=''; } });
 }
 function initNumberGrid() {
 const grid = document.getElementById('number-grid');
 ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'].forEach(n => {
 const b = document.createElement('button'); b.textContent = n; b.className = 'num-btn py-1 rounded text-sm font-bold border transition bg-white border-gray-200 text-gray-700 hover:bg-gray-50';
 b.onclick = () => { state.selectedNumber = n; updateUI(); }; grid.appendChild(b);
 });
 }
 function updateUI() {
 const H = state.hasImage, M = state.selectionMode;
 
 // Main Area visibility
 UI.dropzone.classList.toggle('d-none', H);
 UI.canvasContainer.classList.toggle('d-none', !H);
 UI.canvasContainer.style.width = H ? `${state.zoomLevel}%` : '100%';
 UI.floatingToolbar.classList.toggle('d-none', !H);
 UI.btnReset.classList.toggle('d-none', !H);
 document.getElementById('canvas-size-info').classList.toggle('d-none', !H);
 if(H) document.getElementById('canvas-size-info').textContent = `${refs.baseCanvas.width} × ${refs.baseCanvas.height} px`;
 
 UI.mainArea.classList.toggle('items-start', H); UI.mainArea.classList.toggle('items-center', !H);
 UI.mainArea.classList.toggle('justify-start', H && state.zoomLevel > 100);
 UI.mainArea.classList.toggle('justify-center', !(H && state.zoomLevel > 100));
 UI.mainArea.classList.toggle('cursor-grab', state.isPanningMode);
 UI.mainArea.classList.toggle('active:cursor-grabbing', state.isPanningMode);
 UI.canvasContainer.style.cursor = (H && !state.pastedImage && !state.isPanningMode) ? 'crosshair' : '';
 // Export / Paste buttons
 UI.btnExportPdf.disabled = !H; UI.btnExportPptx.disabled = !H;
 UI.btnInsertImg.disabled = !H; UI.btnPasteImg.disabled = !H;
 // Sidebar Tools highlight
 document.querySelectorAll('.tool-btn').forEach(b => {
 const act = b.dataset.tool === M;
 b.className = `tool-btn py-2 px-1 rounded-lg border text-xs font-bold transition flex flex-col items-center gap-1 ${act?'bg-indigo-50 border-indigo-500 text-indigo-700 shadow-sm':'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`;
 });
 // Settings visibility & Values
 document.querySelectorAll('.tool-settings').forEach(el => el.classList.add('d-none'));
 if(['arrow','number','text','shape'].includes(M)) document.getElementById('settings-'+M).classList.remove('d-none');
 
 // Arrow
 document.getElementById('btn-arrow-straight').className = `flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition ${state.arrowType==='straight'?'bg-indigo-600 border-indigo-600 text-white':'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`;
 document.getElementById('btn-arrow-curved').className = `flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition ${state.arrowType==='curved'?'bg-indigo-600 border-indigo-600 text-white':'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`;
 document.getElementById('arrow-curve-settings').classList.toggle('d-none', state.arrowType!=='curved');
 document.getElementById('lbl-arrow-curve').textContent = state.arrowCurviness>0?`右曲がり (+${state.arrowCurviness})`:state.arrowCurviness<0?`左曲がり (${state.arrowCurviness})`:'直線 (0)';
 document.getElementById('rng-arrow-curve').value = state.arrowCurviness;
 document.getElementById('inp-color-arrow').value = state.arrowColor;
 document.getElementById('lbl-arrow-size').textContent = state.arrowSize + 'px';
 document.getElementById('rng-arrow-size').value = state.arrowSize;
 
 // Number
 document.querySelectorAll('.num-btn').forEach(b => {
 const act = b.textContent === state.selectedNumber;
 b.className = `num-btn py-1 rounded text-sm font-bold border transition ${act?'bg-indigo-600 border-indigo-600 text-white':'bg-white border-gray-200 text-gray-700 hover:bg-gray-50'}`;
 });
 document.getElementById('inp-color-number').value = state.arrowColor;
 document.getElementById('lbl-number-size').textContent = state.numberSize + 'px';
 document.getElementById('rng-number-size').value = state.numberSize;
 
 // Text
 document.getElementById('inp-text-val').value = state.textValue;
 UI.btnClearText.classList.toggle('d-none', state.textValue === '');
 document.getElementById('sel-text-font').value = state.selectedFont;
 document.getElementById('btn-text-bold').className = `w-[42px] h-[38px] flex justify-center items-center rounded-lg text-sm font-bold border transition ${state.isTextBold?'bg-indigo-600 border-indigo-600 text-white':'bg-white border-gray-300 text-gray-700 hover:bg-gray-50 focus:ring-2 focus:ring-indigo-500'}`;
 document.getElementById('inp-color-text').value = state.arrowColor;
 document.getElementById('lbl-text-size').textContent = state.textSize + 'px';
 document.getElementById('rng-text-size').value = state.textSize;
 // Shape
 ['rect','circle','line'].forEach(t => document.getElementById('btn-shape-'+t).className = `flex-1 py-1.5 px-2 rounded-md text-xs font-semibold border transition ${state.shapeType===t?'bg-indigo-600 border-indigo-600 text-white':'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`);
 document.getElementById('inp-color-shape').value = state.arrowColor;
 document.getElementById('lbl-shape-size').textContent = state.shapeSize + 'px';
 document.getElementById('rng-shape-size').value = state.shapeSize;
 // Quality Toggle
 document.getElementById('btn-qual-std').className = `flex-1 py-1.5 rounded-md text-xs font-bold transition flex items-center justify-center gap-1 ${state.renderQuality==='standard'?'bg-white text-gray-800 shadow-sm':'text-gray-500 hover:text-gray-700'}`;
 document.getElementById('btn-qual-high').className = `flex-1 py-1.5 rounded-md text-xs font-bold transition flex items-center justify-center gap-1 ${state.renderQuality==='high'?'bg-indigo-600 text-white shadow-sm':'text-gray-500 hover:text-gray-700'}`;
 // Floating Toolbar Buttons
 const M_rect = (M === 'rectangle' && !state.isPanningMode);
 UI.tbRect.className = `py-2 px-4 rounded-full font-bold transition flex items-center gap-2 text-sm ${M_rect?'bg-indigo-100 text-indigo-700':'text-gray-600 hover:bg-gray-100'}`;
 UI.tbErase.classList.toggle('d-none', !M_rect); UI.tbClear.classList.toggle('d-none', !M_rect);
 
 const M_one = (M === 'oneClickErase' && !state.isPanningMode);
 UI.tbOneclick.className = `py-2 px-4 rounded-full font-bold transition flex items-center gap-2 text-sm ${M_one?'bg-indigo-100 text-indigo-700':'text-gray-600 hover:bg-gray-100'}`;
 const M_eras = (M === 'eraser' && !state.isPanningMode);
 UI.tbEraser.className = `py-2 px-4 rounded-full font-bold transition flex items-center gap-2 text-sm ${M_eras?'bg-indigo-100 text-indigo-700':'text-gray-600 hover:bg-gray-100'}`;
 
 UI.tbUndo.disabled = refs.historyIndex <= 0; UI.tbRedo.disabled = refs.historyIndex >= refs.history.length - 1;
 UI.tbPan.className = `p-2 rounded-full transition flex justify-center items-center ${state.isPanningMode?'bg-indigo-600 text-white shadow-md':'text-gray-500 hover:bg-gray-100'}`;
 UI.rngZoom.value = state.zoomLevel;
 UI.btnZoomReset.textContent = state.zoomLevel + '%';
 UI.floatingToolbar.className = `absolute ${state.toolbarPos==='top'?'top-10':'bottom-10'} left-0 w-full flex justify-center z-[90] pointer-events-none ${!H?'d-none':''}`;
 UI.toolbarWrapper.style.transformOrigin = state.toolbarPos==='top'?'top center':'bottom center';
 
 // Page Nav
 if(state.pages.length > 1) {
 UI.pageNavGroup.classList.remove('d-none');
 UI.tbPageInfo.textContent = `${state.currentPageIndex+1} / ${state.pages.length}`;
 UI.tbPrevPage.disabled = state.currentPageIndex===0; UI.tbNextPage.disabled = state.currentPageIndex===state.pages.length-1;
 } else { UI.pageNavGroup.classList.add('d-none'); }
 // Preview Drawing
 UI.previewBox.classList.toggle('d-none', ['rectangle','eraser','oneClickErase'].includes(M));
 let svgHtml = '';
 if(M==='arrow') {
 const sc = refs.displayScale;
 svgHtml = `<svg width="100%" height="100%"><defs><marker id="m1" markerWidth="3.5" markerHeight="3.5" refX="2.5" refY="1.75" orient="auto"><polygon points="0 0, 3.5 1.75, 0 3.5" fill="${state.arrowColor}" /></marker></defs>
 ${state.arrowType==='straight' 
 ? `<line x1="30" y1="32" x2="170" y2="32" stroke="${state.arrowColor}" stroke-width="${state.arrowSize*sc}" marker-end="url(#m1)" stroke-linecap="butt" />`
 : `<path d="M 30 30 Q 100 ${30+(100*(state.arrowCurviness/180)*0.75)} 170 30" fill="none" stroke="${state.arrowColor}" stroke-width="${state.arrowSize*sc}" marker-end="url(#m1)" stroke-linecap="butt" />`}</svg>`;
 } else if (M==='number') {
 svgHtml = `<span style="color:${state.arrowColor}; font-size:${state.numberSize*refs.displayScale}px; font-weight:bold; line-height:1;">${state.selectedNumber}</span>`;
 } else if (M==='text') {
 svgHtml = `<span style="color:${state.arrowColor}; font-size:${state.textSize*refs.displayScale}px; font-family:${state.selectedFont}; font-weight:${state.isTextBold?'bold':'normal'}; white-space:nowrap; line-height:1;">${state.textValue||'テキスト'}</span>`;
 } else if (M==='shape') {
 const sc = refs.displayScale;
 svgHtml = `<svg width="100%" height="100%">
 ${state.shapeType==='rect' ? `<rect x="35%" y="20%" width="30%" height="60%" fill="none" stroke="${state.arrowColor}" stroke-width="${state.shapeSize*sc}" stroke-linejoin="round" />` : ''}
 ${state.shapeType==='circle' ? `<circle cx="50%" cy="50%" r="20" fill="none" stroke="${state.arrowColor}" stroke-width="${state.shapeSize*sc}" />` : ''}
 ${state.shapeType==='line' ? `<line x1="25%" y1="75%" x2="75%" y2="25%" stroke="${state.arrowColor}" stroke-width="${state.shapeSize*sc}" stroke-linecap="round" />` : ''}
 </svg>`;
 }
 UI.previewContent.innerHTML = svgHtml;
 
 adjustToolbarScale();
 }
 // Run Initialization
 document.addEventListener("DOMContentLoaded", initApp);
 </script>
</body>
</html>
